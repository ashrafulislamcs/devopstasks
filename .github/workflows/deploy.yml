name: Build, Test, Push, Release, Deploy

# Runs on every push to main and on version tags
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  BACKEND_IMAGE: test-assessment-backend
  FRONTEND_IMAGE: test-assessment-frontend

jobs:
  # 1. Test backend and frontend independently
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm install
      - name: Run tests
        working-directory: backend
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Run tests
        working-directory: frontend
        run: npm test
        
  # 2. Build + tag + push images (only on main branch / tags, not PRs)
  build-and-push:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "image_tag=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # Secrets (AWS creds) are pulled from GitHub Secrets, never hardcoded.
      # If AWS credentials are not configured in this repo, this step and the
      # push step are effectively a "mock push": images still build and are
      # tagged, but push is skipped by the `continue-on-error` style guard below.
      - name: Configure AWS credentials
        if: ${{ env.ECR_REGISTRY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ env.ECR_REGISTRY != '' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -t $BACKEND_IMAGE:${{ steps.vars.outputs.image_tag }} \
                        -t $BACKEND_IMAGE:latest ./backend

      - name: Build frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${{ steps.vars.outputs.image_tag }} \
                        -t $FRONTEND_IMAGE:latest ./frontend

      - name: Tag images for ECR
        if: ${{ env.ECR_REGISTRY != '' }}
        run: |
          docker tag $BACKEND_IMAGE:${{ steps.vars.outputs.image_tag }} $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.image_tag }}
          docker tag $FRONTEND_IMAGE:${{ steps.vars.outputs.image_tag }} $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.image_tag }}

      - name: Push images to ECR
        if: ${{ env.ECR_REGISTRY != '' }}
        run: |
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.image_tag }}
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.image_tag }}

      - name: Mock push notice (no registry configured)
        if: ${{ env.ECR_REGISTRY == '' }}
        run: echo "ECR_REGISTRY secret not set - images built and tagged locally only (mock push)."
        
  # 3. Create a GitHub release / tag
  release:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release tag
        run: |
          TAG="v$(date +'%Y.%m.%d')-${{ needs.build-and-push.outputs.image_tag }}"
          git tag $TAG
          git push origin $TAG
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +'%Y.%m.%d')-${{ needs.build-and-push.outputs.image_tag }}"
          generate_release_notes: true
          
  # 4. Deploy to Kubernetes (or mock deploy if no cluster access configured)
  deploy:
    needs: [build-and-push, release]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # secrets can't be referenced directly inside `if:` conditions in GitHub
      # Actions, so we copy it into a plain env var first and check that instead.
      HAS_KUBECONFIG: ${{ secrets.KUBE_CONFIG_DATA != '' }}
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        if: ${{ env.HAS_KUBECONFIG == 'true' }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_DATA" | base64 -d > $HOME/.kube/config

      - name: Deploy to cluster
        if: ${{ env.HAS_KUBECONFIG == 'true' }}
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          kubectl set image deployment/backend backend=$ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG -n app
          kubectl set image deployment/frontend frontend=$ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG -n app
          kubectl rollout status deployment/backend -n app
          kubectl rollout status deployment/frontend -n app

      - name: Mock deploy notice (no cluster access configured)
        if: ${{ env.HAS_KUBECONFIG != 'true' }}
        run: |
          echo "KUBE_CONFIG_DATA secret not set - this is a mock deploy step."
          echo "Would run: kubectl apply -f k8s/ and kubectl set image ..."

# How secrets are stored safely (not committed to the repo):
#
#   - GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, ECR_REGISTRY,
#     KUBE_CONFIG_DATA (base64-encoded kubeconfig) are all set under
#     Repo Settings -> Secrets and variables -> Actions. They are injected
#     as environment variables at runtime and are masked in logs.
