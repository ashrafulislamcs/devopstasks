version: "3.9"

services:
  backend:
    build:
      context: ./backend
    image: devops-assessment/backend:local
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_NAME=appdb
      - DB_USER=appuser
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./frontend
    image: devops-assessment/frontend:local
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BACKEND_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
aws s3api create-bucket --bucket test-assessment-tfstate --region us-east-1
aws s3api put-bucket-versioning --bucket test-assessment-tfstate \
  --versioning-configuration Status=Enabled

aws dynamodb create-table \
  --table-name test-assessment-tf-locks \
  --attribute-definitions AttributeName=LockID,AttributeType=S \
  --key-schema AttributeName=LockID,KeyType=HASH \
  --billing-mode PAY_PER_REQUEST